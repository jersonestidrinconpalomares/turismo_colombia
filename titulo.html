<!DOCTYPE html>
<!-- Le dice al navegador que este archivo está escrito en HTML5 -->

<html lang="es">
<!-- Abre el documento HTML. lang="es" indica que el contenido está en español -->

<head>
<!-- Sección de configuración, el usuario no la ve directamente -->

  <meta charset="UTF-8">
  <!-- Permite usar tildes, ñ y caracteres especiales en el texto -->

  <style>
  /* Aquí van todos los estilos visuales de la página */

    body {
      margin: 0;
      /* Quita el espacio blanco que los navegadores agregan por defecto alrededor de la página */
      background-color: #1a1a1a;
      /* Fondo negro elegante para que combine con el menú y el pie de página */
      display: flex;
      /* Activa flexbox para poder centrar el contenido fácilmente */
      align-items: center;
      /* Centra el título verticalmente dentro del marco */
      justify-content: center;
      /* Centra el título horizontalmente dentro del marco */
      height: 100vh;
      /* Hace que el body ocupe toda la altura del marco del título */
      font-family: Arial, sans-serif;
      /* Define la fuente de todo el texto de esta página */
    }

    h1 {
      color: #FFD700;
      /* Color dorado para el título principal */
      font-size: 28px;
      /* Tamaño grande para que el título se vea imponente */
      letter-spacing: 3px;
      /* Separa las letras entre sí para darle un estilo más elegante */
      text-transform: uppercase;
      /* Pone todo el texto en mayúsculas automáticamente sin tener que escribirlo así */
    }

  </style>
</head>

<body>
<!-- Aquí va todo el contenido visible de la página -->

  <!-- Título principal que aparece en la franja negra superior de la página -->
  <h1>Sitios Turisticos de Colombia</h1>

</body>
<!-- Cierra el contenido visible -->

</html>
<!-- Cierra el documento HTML -->
