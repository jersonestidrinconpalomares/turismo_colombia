<!DOCTYPE html>
<!-- Le dice al navegador que este archivo está escrito en HTML5 -->

<html lang="es">
<!-- Abre el documento HTML. lang="es" indica que el contenido está en español -->

<head>
<!-- Sección de configuración, el usuario no la ve directamente -->

  <meta charset="UTF-8">
  <!-- Permite usar tildes, ñ y caracteres especiales en el texto -->

  <style>
  /* Aquí van todos los estilos visuales de la página */

    body {
      margin: 0;
      /* Quita el espacio blanco que los navegadores agregan por defecto */
      background-color: #1a1a1a;
      /* Fondo negro igual al del título para que todo sea uniforme */
      display: flex;
      /* Activa flexbox para poder centrar el contenido fácilmente */
      flex-direction: column;
      /* Apila los elementos de arriba hacia abajo en lugar de lado a lado */
      align-items: center;
      /* Centra el contenido horizontalmente */
      justify-content: center;
      /* Centra el contenido verticalmente */
      height: 100vh;
      /* Ocupa toda la altura del marco */
      font-family: Arial, sans-serif;
      /* Define la fuente de todo el texto */
    }

    p {
      color: #FFD700;
      /* Texto dorado para que combine con el resto del diseño */
      font-size: 13px;
      /* Tamaño pequeño para que sea un pie de página discreto */
      letter-spacing: 1px;
      /* Separa levemente las letras para que se lea mejor */
      text-align: center;
      /* Centra el texto dentro del párrafo */
      line-height: 1.8;
      /* Espacio entre líneas para que no queden tan pegadas */
      margin: 0;
      /* Quita el margen por defecto del párrafo */
    }

  </style>
</head>

<body>

  <!-- Pie de página con los nombres de los autores, el grado y el año -->
  <p>
    Contenido creado por Rincon Palomares Jerson Estid | Rodriguez Usaquen Uriel Stiven
    <br>
    <!-- br hace un salto de línea sin iniciar un nuevo párrafo -->
    Grado 11-06
    <br>
    <!-- Otro salto de línea para separar el grado del año -->
    Año 2026
  </p>

</body>
<!-- Cierra el contenido visible -->

</html>
<!-- Cierra el documento HTML -->
